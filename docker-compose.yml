version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: propertyhub_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: propertyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: propertyhub_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/propertyhub?schema=public
      - JWT_SECRET=propertyhub_production_secret_key_2026
      - JAZZCASH_MERCHANT_ID=MC12345
      - JAZZCASH_PASSWORD=password123
      - JAZZCASH_INTEGRITY_SALT=salt12345
      - EASYPAISA_STORE_ID=12345
      - EASYPAISA_HASH_KEY=hashkey12345
      - GOOGLE_MAPS_API_KEY=AIzaMockKeyForMaps
    depends_on:
      - db

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: propertyhub_admin
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - server

volumes:
  postgres_data:
